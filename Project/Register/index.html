<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style/main.css">
</head>

<body>
    <div class="parent">
        <div class="sec-1">
            <div class="icon">
                <img src="images/Margin.png" alt="">
                <h1><b>Scholar Slate</b></h1>
            </div>
            <div class="text">
                <h2><strong>The Digital Atelier for Modern Education</strong></h2>
            <p>Join a work space designed for clarity. high-end performance, and collaborative excellence </p>
            </div>
        </div>


        <div class="right-section">
            <div class="form-container">
                <h2>Create your account</h2>
                <p class="subtitle">Welcome! Please enter your details to register.</p>

                <form>
                    <div class="input-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <span class="icon"><img src="images/user.png" alt=""></span>
                            <input type="text" placeholder="John Doe">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <span class="icon"><img src="images/email icon.png" alt=""></span>
                            <input type="email" placeholder="john@example.com">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Select your role</label>
                        <div class="role-selector">
                            <button type="button" class="role-btn active">Student</button>
                            <button type="button" class="role-btn">Teacher</button>
                            <button type="button" class="role-btn">Admin</button>
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" placeholder="••••••••">
                        </div>
                        <div class="input-group">
                            <label>Confirm Password</label>
                            <input type="password" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms">
                        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy
                                Policy</a>.</label>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>

                    <p class="login-link">Already have an account? <a href="#">Sign in here</a></p>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
