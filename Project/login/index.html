<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/main.css">
    <title>login</title>
</head>

<body>
    <div class="sec-1">
        <img src="images/Margin.png" alt="">
        <h1>Sclolar Slate</h1>
        <p>Welcome back to your Digital Atelier</p>
    </div>

    <div class="sec-2">
        <div class="tab click">Student</div>
        <div class="tab">Teacher</div>
        <div class="tab">Admin</div>
    </div>

    <div class="sec-3">
        <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <div class="field">
                <span class="icon"><img src="images/email icon.png" alt=""></span>
                <input type="email" placeholder="name@school.edu">
            </div>
        </div>

        <div class="input-group">
            <div class="label-row">
                <label>PASSWORD</label>

            </div>
            <div class="field">
                <span class="icon"><img src="images/bill.png" alt=""></span>
                <input type="password" placeholder="••••••••">
                <span class="eye"><img src="images/eye.png" alt=""></span>
            </div>
            <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button class="login-btn">
            Sign In to Dashboard <span>→</span>
        </button>
    </div>
    <br>
    <p>New to Sclolar Slate? <a href="#">Create an account</a></p>
</body>

</html>
