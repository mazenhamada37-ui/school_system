<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>login</title>
</head>

<body>
    <div class="sec-1">
        <img src="images/Margin.png" alt="">
        <h1>Sclolar Slate</h1>
        <p>Welcome back to your Digital Atelier</p>
    </div>

    <div class="sec-2">
        <button type="button" class="role-btn active">Student</button>
        <button type="button" class="role-btn">Teacher</button>
        <button type="button" class="role-btn">Admin</button>
    </div>
    </div>

    <div class="sec-3">
        <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <div class="field">
                <span class="icon"><i class="fa-regular fa-envelope"></i></span>
                <input type="email" placeholder="name@school.edu">
            </div>
        </div>

        <div class="input-group">
            <div class="label-row">
                <label>PASSWORD</label>

            </div>
            <div class="field">
                <span class="icon"><i class="fa-solid fa-lock"></i></span>
                <input type="password" placeholder="••••••••">
                <span class="eye"><i class="fa-solid fa-eye"></i></i></span>
            </div>
            <a href="../forget password/index.html" class="forgot">Forgot password?</a>
        </div>

        <button class="login-btn">
            Sign In to Dashboard <span>→</span>
        </button>
    </div>
    <br>
    <p>New to Sclolar Slate? <a href="../Register/index.html">Create an account</a></p>
</body>

</html>
